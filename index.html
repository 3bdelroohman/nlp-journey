<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>حياة متكاملة | رحلة المنحة</title>
<meta name="theme-color" content="#050816">
<style>
:root{
--bg0:#050816;--bg1:#0B1120;--bg2:#111827;--bgc:rgba(17,24,39,.65);
--gl:rgba(255,255,255,.04);--gb:rgba(255,255,255,.08);
--t0:#fff;--t1:#E2E8F0;--t2:#94A3B8;--t3:#475569;
--nlp:#06B6D4;--nlpg:linear-gradient(135deg,#06B6D4,#0EA5E9);--nlpb:rgba(6,182,212,.08);
--cl:#8B5CF6;--clg:linear-gradient(135deg,#8B5CF6,#A78BFA);--clb:rgba(139,92,246,.08);
--sc:#F59E0B;--scg:linear-gradient(135deg,#F59E0B,#FBBF24);--scb:rgba(245,158,11,.08);
--ok:#10B981;--okg:linear-gradient(135deg,#10B981,#34D399);--okb:rgba(16,185,129,.08);
--sp:#3B82F6;--spg:linear-gradient(135deg,#3B82F6,#60A5FA);--spb:rgba(59,130,246,.08);
--hl:#EC4899;--hlg:linear-gradient(135deg,#EC4899,#F472B6);--hlb:rgba(236,72,153,.08);
--err:#EF4444;--warn:#F59E0B;
--r:20px;--rs:12px;--nh:72px;
--sh:0 4px 30px rgba(0,0,0,.25)
}
.light{
--bg0:#F0F4F8;--bg1:#F8FAFC;--bg2:#fff;--bgc:rgba(255,255,255,.75);
--gl:rgba(255,255,255,.5);--gb:rgba(0,0,0,.06);
--t0:#0F172A;--t1:#1E293B;--t2:#64748B;--t3:#94A3B8;
--nlpb:rgba(6,182,212,.06);--clb:rgba(139,92,246,.06);--scb:rgba(245,158,11,.06);
--okb:rgba(16,185,129,.06);--spb:rgba(59,130,246,.06);--hlb:rgba(236,72,153,.06);
--sh:0 4px 24px rgba(0,0,0,.06)
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg0);color:var(--t1);overflow-x:hidden;transition:background .4s,color .4s}
::-webkit-scrollbar{width:0;display:none}
canvas#ptc{position:fixed;inset:0;z-index:0;pointer-events:none}

.pg{display:none;opacity:0;transform:translateY(18px);transition:opacity .4s,transform .4s;position:relative;z-index:1;min-height:100vh;padding-bottom:calc(var(--nh)+20px)}
.pg.act{display:block;opacity:1;transform:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes blob{0%,100%{border-radius:42% 58% 70% 30%/45% 45% 55% 55%}50%{border-radius:30% 70% 55% 45%/55% 45% 55% 45%}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(16,185,129,.3)}50%{box-shadow:0 0 20px rgba(16,185,129,.6)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes countdown{from{stroke-dashoffset:0}to{stroke-dashoffset:283}}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}.reveal.vis{opacity:1;transform:none}
.stag>*{opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s}
.stag.vis>*:nth-child(1){transition-delay:.05s;opacity:1;transform:none}
.stag.vis>*:nth-child(2){transition-delay:.1s;opacity:1;transform:none}
.stag.vis>*:nth-child(3){transition-delay:.15s;opacity:1;transform:none}
.stag.vis>*:nth-child(4){transition-delay:.2s;opacity:1;transform:none}
.stag.vis>*:nth-child(5){transition-delay:.25s;opacity:1;transform:none}
.stag.vis>*:nth-child(6){transition-delay:.3s;opacity:1;transform:none}
.stag.vis>*:nth-child(n+7){transition-delay:.35s;opacity:1;transform:none}

/* HERO */
.hero{padding:44px 20px 24px;position:relative}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hero-acts{display:flex;gap:8px}
.hbtn{width:36px;height:36px;border-radius:12px;border:1px solid var(--gb);background:var(--gl);backdrop-filter:blur(12px);color:var(--t1);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.3s}.hbtn:active{transform:scale(.9)}
.hero-greet{font-size:13px;color:var(--t2)}
.hero-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--nlp),var(--cl),var(--sc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;margin:2px 0}
.hero-motiv{font-size:11px;color:var(--t2);line-height:1.6}

/* RECOVERY BANNER */
.rec-banner{margin:0 20px 12px;background:var(--okg);border-radius:var(--r);padding:16px 18px;color:#fff;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s}
.rec-banner:active{transform:scale(.98)}
.rec-banner .rb-blob{position:absolute;width:80px;height:80px;background:rgba(255,255,255,.1);animation:blob 8s infinite;top:-15px;right:-15px}
.rec-banner .rb-days{font-size:36px;font-weight:800}
.rec-banner .rb-label{font-size:11px;opacity:.9;margin-top:2px}
.rec-banner .rb-phase{font-size:10px;opacity:.85;margin-top:6px;padding:3px 10px;background:rgba(255,255,255,.15);border-radius:8px;display:inline-block}
.rec-banner .rb-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:8px;overflow:hidden}
.rec-banner .rb-fill{height:100%;background:#fff;border-radius:2px;transition:width .6s}

/* HERO STATS */
.hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}
.hs{background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--rs);padding:10px 6px;text-align:center;cursor:pointer;transition:transform .3s}.hs:active{transform:scale(.96)}
.hs .v{font-size:16px;font-weight:800}.hs .l{font-size:8px;color:var(--t2);margin-top:2px}

/* MOOD CHECK */
.mood-card{margin:12px 20px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);padding:14px}
.mood-card .mc-t{font-size:12px;font-weight:700;color:var(--t0);margin-bottom:10px}
.mood-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mood-item{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:55px}
.mood-item .ml{font-size:8px;color:var(--t2)}
.mood-dots{display:flex;gap:3px}
.mood-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--gb);background:var(--gl);cursor:pointer;transition:.3s}
.mood-dot.on{border-color:var(--nlp);background:var(--nlp)}

/* BUDGET */
.bud{background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);padding:12px 16px;margin:0 20px 10px}
.bud-top{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:5px}
.bud-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}.light .bud-bar{background:rgba(0,0,0,.05)}
.bud-fill{height:100%;border-radius:3px;transition:width .6s}
.bud-info{display:flex;justify-content:space-between;font-size:9px;color:var(--t2);margin-top:4px}

/* PATH CARDS */
.pcards{display:flex;flex-direction:column;gap:12px;padding:0 20px}
.pc{background:var(--bgc);backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:var(--r);padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:transform .3s}
.pc:active{transform:scale(.97)}
.pc .gw{position:absolute;width:110px;height:110px;border-radius:50%;filter:blur(55px);opacity:.12;top:-18px;right:-18px}
.pc .pci{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;z-index:1;position:relative}
.pc .pcn{font-size:16px;font-weight:800;color:var(--t0);z-index:1;position:relative}
.pc .pcd{font-size:10px;color:var(--t2);margin-top:3px;line-height:1.5;z-index:1;position:relative}
.pc .pcbar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:10px;overflow:hidden;z-index:1;position:relative}.light .pc .pcbar{background:rgba(0,0,0,.05)}
.pc .pcfill{height:100%;border-radius:3px;transition:width .8s}
.pc .pcmeta{display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--t2);z-index:1;position:relative}
.pc .pcpct{font-size:13px;font-weight:800;position:absolute;top:18px;left:18px;z-index:1}
[dir=ltr] .pc .pcpct{left:auto;right:18px}

/* HABITS STRIP */
.hab-strip{display:flex;gap:10px;padding:0 20px;overflow-x:auto;scroll-snap-type:x mandatory}.hab-strip::-webkit-scrollbar{display:none}
.hb{min-width:90px;flex-shrink:0;scroll-snap-align:start;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .3s}
.hb:active{transform:scale(.95)}.hb.dn{border-color:var(--ok);background:var(--okb)}
.hb .hbi{font-size:20px;margin-bottom:4px}.hb .hbn{font-size:9px;font-weight:600;color:var(--t0)}
.hb .hbc{width:24px;height:24px;border-radius:50%;border:2px solid var(--t3);margin:6px auto 0;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:.3s}
.hb.dn .hbc{border-color:var(--ok);background:var(--ok);color:#fff}

/* COUNTDOWN */
.cd-strip{display:flex;gap:10px;padding:0 20px;overflow-x:auto;scroll-snap-type:x mandatory}.cd-strip::-webkit-scrollbar{display:none}
.cdc{min-width:120px;flex-shrink:0;scroll-snap-align:start;border-radius:var(--r);padding:14px;color:#fff;text-align:center;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s}.cdc:active{transform:scale(.96)}
.cdc .cdb{position:absolute;width:45px;height:45px;background:rgba(255,255,255,.1);animation:blob 8s infinite;top:-8px;right:-8px}
.cdc .cdv{font-size:24px;font-weight:800}.cdc .cdl{font-size:9px;opacity:.85;margin-top:2px}

/* SECTION TITLE */
.st{font-size:14px;font-weight:800;padding:14px 20px 8px;color:var(--t0);display:flex;align-items:center;gap:8px}
.st .bdg{font-size:9px;background:var(--gl);border:1px solid var(--gb);padding:2px 8px;border-radius:12px;color:var(--t2);font-weight:600}

/* TABS */
.tabs{display:flex;gap:7px;padding:8px 20px;overflow-x:auto}.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 13px;border-radius:11px;font-size:11px;font-weight:600;border:1px solid var(--gb);cursor:pointer;white-space:nowrap;transition:.3s;background:var(--gl);color:var(--t2);font-family:inherit}
.tab.act{background:var(--nlpg);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(6,182,212,.2)}

/* DAY STRIP */
.ds{margin:0 16px 10px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);padding:12px 16px;position:sticky;top:0;z-index:10}
.ds-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ds-t{font-size:12px;font-weight:700;color:var(--t0)}
.ds-btn{border:none;background:var(--nlpb);color:var(--nlp);padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid rgba(6,182,212,.15)}
.ds-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}.light .ds-bar{background:rgba(0,0,0,.05)}
.ds-fill{height:100%;border-radius:3px;transition:width .5s}
.ds-info{display:flex;justify-content:space-between;font-size:9px;color:var(--t2);margin-top:4px}
.ds-over{color:var(--err)!important}

/* BRANCH CARD */
.bc{display:flex;align-items:center;gap:12px;padding:13px 16px;margin:0 16px 7px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);cursor:pointer;transition:transform .3s}.bc:active{transform:scale(.98)}
.bci{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bcf{flex:1;min-width:0}.bcn{font-size:12px;font-weight:700;color:var(--t0)}.bcm{font-size:10px;color:var(--t2);margin-top:2px}
.bcbar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}.light .bcbar{background:rgba(0,0,0,.05)}
.bcfill{height:100%;border-radius:2px;transition:width .6s}
.bcp{font-size:12px;font-weight:800;flex-shrink:0}

/* DETAIL */
.dh{padding:14px 20px;display:flex;align-items:center;gap:12px}
.bk{width:36px;height:36px;border-radius:11px;border:1px solid var(--gb);background:var(--bgc);backdrop-filter:blur(12px);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t1);transition:.3s}.bk:active{transform:scale(.9)}
.di{flex:1}.dtt{font-size:16px;font-weight:800;color:var(--t0)}.dts{font-size:10px;color:var(--t2);margin-top:1px}
.dprog{margin:0 16px 12px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);padding:12px 16px}
.dsec{margin:0 16px 10px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);overflow:hidden}
.dsh{padding:11px 16px;font-size:12px;font-weight:700;color:var(--t0);border-bottom:1px solid var(--gb)}
.ir{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.03)}.light .ir{border-color:rgba(0,0,0,.03)}.ir:last-child{border:none}
.ck{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;flex-shrink:0;margin-top:2px;font-size:10px;color:transparent}.ck.chk{border-color:var(--ok);background:var(--ok);color:#fff}
.ic{flex:1;min-width:0}
.inm{font-size:11px;font-weight:600;color:var(--t0);line-height:1.4}.inm.dn{text-decoration:line-through;opacity:.4}
.itg{display:inline-block;font-size:8px;padding:2px 6px;border-radius:5px;background:var(--gl);border:1px solid var(--gb);color:var(--t2);margin:2px 2px 0 0}
.ipr{display:flex;align-items:center;gap:6px;margin-top:4px}
.ipr .pb{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}.light .ipr .pb{background:rgba(0,0,0,.05)}
.ipr .pf{height:100%;border-radius:2px;transition:width .5s}.ipr .pt{font-size:8px;color:var(--t2)}
.ibs{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.ib{padding:3px 8px;border-radius:6px;border:1px solid var(--gb);font-size:8px;cursor:pointer;transition:.2s;font-family:inherit;font-weight:600;background:var(--gl);color:var(--t2)}.ib:active{transform:scale(.95)}
.ib.p{background:var(--nlpb);color:var(--nlp);border-color:rgba(6,182,212,.15)}
.ib.s{background:var(--clb);color:var(--cl);border-color:rgba(139,92,246,.15)}
.ib.w{background:var(--scb);color:var(--sc);border-color:rgba(245,158,11,.15)}
.subs{margin-top:5px;padding-right:10px;border-right:2px solid var(--gb)}
[dir=ltr] .subs{padding-right:0;border-right:none;padding-left:10px;border-left:2px solid var(--gb)}
.si{display:flex;align-items:center;gap:6px;padding:3px 0}
.sck{width:15px;height:15px;border-radius:50%;border:2px solid var(--t3);cursor:pointer;transition:.25s;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;color:transparent}.sck.chk{border-color:var(--ok);background:var(--ok);color:#fff}
.snm{font-size:10px;flex:1;color:var(--t1)}.snm.dn{text-decoration:line-through;opacity:.4}
.sdel{background:none;border:none;font-size:10px;color:var(--err);cursor:pointer;padding:2px}

/* ===== INTERACTIVE TIMELINE ===== */
.tl-wrap{padding:10px 16px 16px}
.tl-head{font-size:11px;color:var(--t2);margin-bottom:10px;line-height:1.6}
.tl-tasks{margin-bottom:12px}
.tl-task{display:flex;align-items:center;gap:10px;background:var(--bgc);backdrop-filter:blur(12px);border:1px solid var(--gb);border-radius:14px;padding:10px 12px;margin-bottom:6px;transition:transform .2s}
.tl-task:active{transform:scale(.98)}
.tl-task .tt-color{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.tl-task .tt-info{flex:1;min-width:0}
.tl-task .tt-name{font-size:11px;font-weight:700;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-task .tt-time{font-size:9px;color:var(--t2);margin-top:1px}
.tl-task .tt-del{border:none;background:none;color:var(--err);font-size:14px;cursor:pointer;padding:3px}

.tl-grid{background:var(--bgc);backdrop-filter:blur(12px);border:1px solid var(--gb);border-radius:var(--r);overflow:hidden;position:relative}
.tl-slot{display:grid;grid-template-columns:50px 1fr;align-items:stretch;min-height:36px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s;position:relative}
.light .tl-slot{border-color:rgba(0,0,0,.03)}.tl-slot:last-child{border-bottom:none}
.tl-slot:active{background:rgba(255,255,255,.03)}
.tl-slot .sl-time{font-size:9px;font-weight:700;color:var(--nlp);padding:8px 6px;display:flex;align-items:flex-start;justify-content:center}
.tl-slot .sl-content{padding:4px 8px;min-height:32px;display:flex;align-items:center;position:relative}
.tl-slot .sl-empty{font-size:9px;color:var(--t3);opacity:.5}
.tl-slot .sl-task{flex:1;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.tl-slot .sl-task .sl-dur{font-size:8px;opacity:.8;margin-top:1px}
.tl-slot .sl-task .sl-edit{position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:10px;opacity:.7}
[dir=ltr] .tl-slot .sl-task .sl-edit{left:auto;right:6px}
.tl-slot.half{min-height:24px}.tl-slot.half .sl-time{font-size:8px;opacity:.6}
.tl-add-float{position:fixed;bottom:calc(var(--nh) + 16px);right:20px;width:50px;height:50px;border-radius:50%;background:var(--nlpg);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(6,182,212,.3);z-index:9;display:flex;align-items:center;justify-content:center;transition:transform .3s}
[dir=rtl] .tl-add-float{right:auto;left:20px}
.tl-add-float:active{transform:scale(.9)}

/* WELLNESS PAGE */
.well-hero{margin:0 20px 14px;border-radius:var(--r);padding:24px;color:#fff;text-align:center;position:relative;overflow:hidden}
.well-hero .wh-blob{position:absolute;width:90px;height:90px;background:rgba(255,255,255,.1);animation:blob 10s infinite;top:-15px;right:-15px}
.well-hero .wh-days{font-size:52px;font-weight:800}
.well-hero .wh-label{font-size:13px;opacity:.9;margin-top:4px}
.well-hero .wh-phase{display:inline-block;margin-top:8px;padding:4px 14px;background:rgba(255,255,255,.15);border-radius:10px;font-size:11px}
.well-hero .wh-bar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:10px;overflow:hidden}
.well-hero .wh-fill{height:100%;background:#fff;border-radius:3px;transition:width .8s}
.well-hero .wh-msg{font-size:11px;opacity:.85;margin-top:8px;line-height:1.5}
.sos-btn{margin:0 20px 14px;padding:16px;border-radius:var(--r);border:2px solid var(--err);background:var(--hlb);color:var(--err);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;width:calc(100% - 40px);text-align:center;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
.sos-btn:active{transform:scale(.97);background:var(--err);color:#fff}
.symp-card{margin:0 20px 10px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);padding:14px}
.symp-card .symp-t{font-size:12px;font-weight:700;color:var(--t0);margin-bottom:8px}
.symp-grid{display:flex;flex-wrap:wrap;gap:6px}
.symp{padding:6px 12px;border-radius:10px;border:1px solid var(--gb);background:var(--gl);font-size:10px;font-weight:600;cursor:pointer;transition:.3s;color:var(--t2);font-family:inherit}
.symp.on{background:var(--hlb);border-color:var(--hl);color:var(--hl)}

.hab-full{margin:0 16px 8px;background:var(--bgc);backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .3s}

function ensureDay(ds){
  if(!S.dailyPlan.days[ds])S.dailyPlan.days[ds]={allocations:[],slots:emptySlots(),note:''};
  var day=S.dailyPlan.days[ds];
  if(!Array.isArray(day.allocations))day.allocations=[];
  if(!day.slots)day.slots=emptySlots();
  if(typeof day.note==='undefined')day.note='';
  return day;
}
function dayBudgetH(ds){return Number(S.dailyPlan.overrides[ds]||S.dailyPlan.baseHours||3)}
function dayBudgetM(ds){return Math.round(dayBudgetH(ds)*60)}
function dayAllocs(ds){return ensureDay(ds).allocations}
function daySlots(ds){return ensureDay(ds).slots}
function dayUsedM(ds){var n=0;dayAllocs(ds).forEach(function(a){n+=Number(a.minutes||0)});return n}
function dayLeftM(ds){return dayBudgetM(ds)-dayUsedM(ds)}
function fmtM(min){min=Math.round(Math.max(0,Math.abs(min||0)));var h=Math.floor(min/60),m=min%60;if(S.lang==='ar'){if(h&&m)return h+'س '+m+'د';if(h)return h+'س';return m+'د'}else{if(h&&m)return h+'h '+m+'m';if(h)return h+'h';return m+'m'}}
function fmtSM(min){if(min<0)return '-'+fmtM(min);return fmtM(min)}

function addAlloc(iid,minutes,startSlot,extra){
  var ds=tKey(),day=ensureDay(ds);
  var aid='a'+Date.now()+Math.random().toString(36).slice(2,5);
  day.allocations.push({id:aid,itemId:iid,minutes:minutes,startSlot:startSlot||null,note:extra||'',createdAt:Date.now()});
  if(startSlot){
    var slots=Math.ceil(minutes/30);
    var keys=Object.keys(day.slots).sort();
    var idx=keys.indexOf(startSlot);
    if(idx>=0){for(var i=0;i<slots&&(idx+i)<keys.length;i++){day.slots[keys[idx+i]]=aid}}
  }
  sv();
}
function removeAlloc(aid){
  var ds=tKey(),day=ensureDay(ds);
  day.allocations=day.allocations.filter(function(a){return a.id!==aid});
  for(var k in day.slots){if(day.slots[k]===aid)day.slots[k]=null}
  sv();
}
function moveAlloc(aid,newSlot){
  var ds=tKey(),day=ensureDay(ds);
  var alloc=day.allocations.find(function(a){return a.id===aid});
  if(!alloc)return;
  for(var k in day.slots){if(day.slots[k]===aid)day.slots[k]=null}
  alloc.startSlot=newSlot;
  var slots=Math.ceil(alloc.minutes/30);
  var keys=Object.keys(day.slots).sort();
  var idx=keys.indexOf(newSlot);
  if(idx>=0){for(var i=0;i<slots&&(idx+i)<keys.length;i++){day.slots[keys[idx+i]]=aid}}
  sv();
}
function updateAllocTime(aid,newMinutes){
  var ds=tKey(),day=ensureDay(ds);
  var alloc=day.allocations.find(function(a){return a.id===aid});
  if(!alloc)return;
  for(var k in day.slots){if(day.slots[k]===aid)day.slots[k]=null}
  alloc.minutes=newMinutes;
  if(alloc.startSlot){
    var slots=Math.ceil(newMinutes/30);
    var keys=Object.keys(day.slots).sort();
    var idx=keys.indexOf(alloc.startSlot);
    if(idx>=0){for(var i=0;i<slots&&(idx+i)<keys.length;i++){day.slots[keys[idx+i]]=aid}}
  }
  sv();
}
function getSlotAlloc(slotKey){
  var ds=tKey(),day=ensureDay(ds);

function lifeScore(){

  var ap=0;DATA.roots.forEach(function(r){ap+=rProg(r.id).p});scores.academic=Math.round(ap/3);
  // Spiritual = habit completion for spiritual habits
  var sp=0,sc=0;HABITS.forEach(function(h){if(h.cat==='spiritual'){sc++;if(isHabDone(h.id))sp++}});scores.spiritual=sc?Math.round(sp/sc*100):0;

function drawWheel(canvasId){
  var cv=document.getElementById(canvasId);if(!cv)return;
  var ctx=cv.getContext('2d'),w=cv.width=220,h=cv.height=220,cx=w/2,cy=h/2,r=85;
  var sc=lifeScore();
  var cats=[
    {name:S.lang==='ar'?'أكاديمي':'Academic',val:sc.academic,color:'#06B6D4'},
    {name:S.lang==='ar'?'روحاني':'Spiritual',val:sc.spiritual,color:'#3B82F6'},
    {name:S.lang==='ar'?'صحي':'Health',val:sc.health,color:'#EC4899'},
    {name:S.lang==='ar'?'تعافي':'Recovery',val:sc.recovery,color:'#10B981'},
    {name:S.lang==='ar'?'تركيز':'Focus',val:sc.focus,color:'#8B5CF6'},
    {name:S.lang==='ar'?'طاقة':'Energy',val:sc.energy,color:'#F59E0B'}
  ];
  var n=cats.length,angle=Math.PI*2/n;
  ctx.clearRect(0,0,w,h);
  // Grid
  for(var lv=1;lv<=5;lv++){
    ctx.beginPath();
    for(var i=0;i<=n;i++){var a=-Math.PI/2+angle*i;var lr=r*lv/5;ctx.lineTo(cx+lr*Math.cos(a),cy+lr*Math.sin(a))}
    ctx.closePath();ctx.strokeStyle=document.body.classList.contains('light')?'rgba(0,0,0,.06)':'rgba(255,255,255,.06)';ctx.stroke();
  }
  // Data
  ctx.beginPath();
  cats.forEach(function(c,i){var a=-Math.PI/2+angle*i;var lr=r*Math.min(100,c.val)/100;
  if(i===0)ctx.moveTo(cx+lr*Math.cos(a),cy+lr*Math.sin(a));else ctx.lineTo(cx+lr*Math.cos(a),cy+lr*Math.sin(a))});
  ctx.closePath();ctx.fillStyle='rgba(6,182,212,.15)';ctx.fill();ctx.strokeStyle='#06B6D4';ctx.lineWidth=2;ctx.stroke();
  // Labels
  ctx.font='bold 9px Segoe UI';ctx.textAlign='center';
  cats.forEach(function(c,i){var a=-Math.PI/2+angle*i;var lr=r+18;
  ctx.fillStyle=c.color;ctx.fillText(c.name,cx+lr*Math.cos(a),cy+lr*Math.sin(a)+3);
  ctx.fillStyle=document.body.classList.contains('light')?'#1E293B':'#E2E8F0';ctx.fillText(c.val+'%',cx+(r+8)*Math.cos(a),cy+(r+8)*Math.sin(a)+3)});
  // Points
  cats.forEach(function(c,i){var a=-Math.PI/2+angle*i;var lr=r*Math.min(100,c.val)/100;
  ctx.beginPath();ctx.arc(cx+lr*Math.cos(a),cy+lr*Math.sin(a),4,0,Math.PI*2);ctx.fillStyle=c.color;ctx.fill()});
}

  h+='<div style="font-size:13px;font-weight:700;color:var(--t0);margin:12px 0 8px">📅 '+t('todayTitle')+'</div>';
  h+='<div class="tl-grid">';
  var keys=Object.keys(slots).sort();
  keys.forEach(function(key){
    var aid=slots[key];
    var alloc=aid?allocs.find(function(a){return a.id===aid}):null;
    var item=alloc?getItem(alloc.itemId):null;
    var meta=item?findMeta(alloc.itemId):null;
    var col=meta?gRaw(meta.rid):'#06B6D4';
    var isHalf=key.endsWith(':30');
    // Check if this slot is continuation of previous
    var prevKey=null;if(isHalf){prevKey=key.replace(':30',':00')}
    var isContinuation=false;
    if(aid&&prevKey&&slots[prevKey]===aid)isContinuation=true;

    if(isContinuation){
      // Don't render a separate row, the previous :00 slot covers this
      return;
    }

    if(item&&alloc){
      var slotsCount=Math.ceil(alloc.minutes/30);
      var heightPx=Math.max(32,slotsCount*36);
      h+='<div class="tl-slot" style="min-height:'+heightPx+'px" onclick="openSlotAction(\''+alloc.id+'\',\''+key+'\')">';
      h+='<div class="sl-time">'+key+'</div>';

      h+='</div>';
      // Skip slots covered by this task
      var idx=keys.indexOf(key);
      for(var s=1;s<slotsCount&&(idx+s)<keys.length;s++){
        var skipKey=keys[idx+s];
        if(slots[skipKey]===aid){/* will be skipped by isContinuation check or we mark */}
      }
    }else{
      h+='<div class="tl-slot'+(isHalf?' half':'')+'" onclick="openSlotPicker(\''+key+'\')">';
      h+='<div class="sl-time">'+key+'</div>';
      h+='<div class="sl-content"><div class="sl-empty">'+t('slotEmpty')+'</div></div>';
      h+='</div>';
    }
  });
  h+='</div>';

  // End of day note
  var note=ensureDay(ds).note||'';
  h+='<div style="margin-top:14px"><div style="font-size:13px;font-weight:700;color:var(--t0);margin-bottom:6px">📝 '+t('noteTitle')+'</div><textarea id="day-note" style="width:100%;padding:10px;border:1px solid var(--gb);border-radius:12px;background:var(--gl);color:var(--t1);font-family:inherit;font-size:11px;resize:vertical;min-height:60px" placeholder="'+t('notePlaceholder')+'">'+escH(note)+'</textarea><button class="mb2 pri" style="margin-top:6px" onclick="saveNote()">'+t('save')+'</button></div>';

  document.getElementById('tl-content').innerHTML=h;sv();
}

function addSubG(si){S.gpa.sems[si].subs.push({n:'',g:'excellent'});sv();rStatsGpa()}
function delSubG(si,sbi){S.gpa.sems[si].subs.splice(sbi,1);sv();rStatsGpa()}

function delSem(si){if(S.gpa.sems.length<=1)return;S.gpa.sems.splice(si,1);sv();rStatsGpa()}
function calcGpa(){
  var pts={excellent:4,vgood:3,good:2,pass:1,weak:0,vweak:0},tot=0,cnt=0;
  S.gpa.sems.forEach(function(sem){sem.subs.forEach(function(sub){tot+=pts[sub.g]||0;cnt++})});
  if(!cnt)return toast('⚠️');var avg=tot/cnt;var g,ge,g4,uk,adv;
  if(avg>=3.5){g='ممتاز';ge='Excellent';g4='4.0';uk='First Class';adv=t('adv1')}

// Fix: Timeline slot rendering - skip covered slots properly
function getSlotSpan(aid,ds){
  var day=ensureDay(ds),count=0;
  var keys=Object.keys(day.slots).sort();
  for(var i=0;i<keys.length;i++){
    if(day.slots[keys[i]]===aid)count++;

  return count;
}

// Enhancement: Smart energy-based suggestions
function getSmartSuggestion(){
  var energy=getMood('energy'),focus=getMood('focus');

    if(focus<=2)return'🌊 Low focus — try 10min exercise then come back';

// Enhancement: Weekly heatmap data
function getWeekHeatmap(){
  var data=[];
  var d=new Date();d.setDate(d.getDate()-6);
  for(var i=0;i<7;i++){
    var m=('0'+(d.getMonth()+1)).slice(-2),da=('0'+d.getDate()).slice(-2);
    var key=d.getFullYear()+'-'+m+'-'+da;
    var habCount=0;
    HABITS.forEach(function(h){if(S.habits[key+'_'+h.id])habCount++});
    var level=0;
    if(habCount>=1)level=1;if(habCount>=4)level=2;if(habCount>=8)level=3;if(habCount>=10)level=4;
    var dayNames=S.lang==='ar'?['أحد','إثن','ثلا','أرب','خمي','جمع','سبت']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    data.push({day:dayNames[d.getDay()],level:level,count:habCount});
    d.setDate(d.getDate()+1);
  }
  return data;
}
