<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>رحلة NLP العربي</title>
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{
  --bg:#F4F7FB;--bgc:#FFFFFF;--text:#0F172A;--text2:#64748B;
  --pri:#4F46E5;--pril:#818CF8;--grn:#16A34A;--pur:#6366F1;--blu:#2563EB;
  --pnk:#0EA5E9;--red:#DC2626;--teal:#0891B2;--warn:#D97706;
  --gbg:#ECFDF5;--pbg:#EEF2FF;--obg:#FFF7ED;--bbg:#EFF6FF;
  --sh:0 8px 24px rgba(15,23,42,.08);--r:18px;--nh:66px
}
.dark{
  --bg:#0F172A;--bgc:#111827;--text:#E5E7EB;--text2:#94A3B8;
  --sh:0 8px 24px rgba(0,0,0,.35);--gbg:#10261b;--pbg:#1B2140;--obg:#2B1F12;--bbg:#0F2238
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:var(--nh);transition:background .25s,color .25s}
::-webkit-scrollbar{display:none}
.page{
  display:block;
  opacity:0;
  transform:translateX(14px);
  pointer-events:none;
  height:0;
  overflow:hidden;
  transition:opacity .22s ease, transform .22s ease;
}
.page.back{transform:translateX(-14px)}
.page.act{
  opacity:1;
  transform:translateX(0);
  pointer-events:auto;
  height:auto;
  overflow:visible;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes blob{0%,100%{border-radius:42% 58% 70% 30%/45% 45% 55% 55%}25%{border-radius:55% 45% 40% 60%/65% 35% 65% 35%}50%{border-radius:30% 70% 55% 45%/55% 45% 55% 45%}75%{border-radius:65% 35% 45% 55%/40% 60% 40% 60%}}

.onboard{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column}.onboard.hide{display:none}
.ob-slide{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden;display:none}.ob-slide.act{display:flex}
.ob-blob1{position:absolute;width:180px;height:180px;background:rgba(255,255,255,.1);animation:blob 8s infinite;top:8%;right:-30px}
.ob-blob2{position:absolute;width:130px;height:130px;background:rgba(255,255,255,.08);animation:blob 10s infinite reverse;bottom:14%;left:-20px}
.ob-char{font-size:96px;margin-bottom:18px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 10px 20px rgba(0,0,0,.08))}
.ob-title{font-size:26px;font-weight:700;color:#fff;text-align:center;margin-bottom:8px}
.ob-desc{font-size:14px;color:rgba(255,255,255,.86);text-align:center;line-height:1.6;max-width:300px}
.ob-dots{position:absolute;bottom:30%;display:flex;gap:8px}
.ob-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);transition:.3s}.ob-dots span.act{background:#fff;width:22px;border-radius:4px}
.ob-next{position:absolute;bottom:12%;width:56px;height:56px;border-radius:50%;background:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:.3s;display:flex;align-items:center;justify-content:center}.ob-next:active{transform:scale(.92)}
.ob-skip{position:absolute;top:44px;left:26px;background:none;border:none;color:rgba(255,255,255,.75);font-size:14px;cursor:pointer;font-family:inherit}

.hdr{background:linear-gradient(135deg,#4338CA,#4F46E5,#6366F1);color:#fff;padding:26px 18px 62px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:26px;background:var(--bg);border-radius:26px 26px 0 0}
.hdr-blob{position:absolute;width:110px;height:110px;background:rgba(255,255,255,.08);animation:blob 12s infinite;top:-18px;left:-18px}
.hdr-blob2{position:absolute;width:76px;height:76px;background:rgba(255,255,255,.06);animation:blob 15s infinite reverse;top:28px;right:8px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:relative;z-index:1}
.hdr-acts{display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,.16);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:14px;cursor:pointer;transition:.3s;backdrop-filter:blur(8px)}.hdr-btn:active{transform:scale(.92)}
.hdr h2{font-size:21px;font-weight:700;position:relative;z-index:1}
.hdr .motiv{font-size:12px;opacity:.92;margin-top:4px;line-height:1.55;position:relative;z-index:1}
.hdr-box{background:rgba(255,255,255,.13);border-radius:14px;padding:12px 14px;margin-top:10px;backdrop-filter:blur(8px);position:relative;z-index:1}
.hdr-box-title{font-size:12px;opacity:.9;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.hdr-bar{height:8px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden;margin-bottom:5px}
.hdr-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.hdr-bar-info{font-size:10px;opacity:.85;display:flex;justify-content:space-between;gap:8px}

.c{background:var(--bgc);border-radius:var(--r);padding:16px;box-shadow:var(--sh);transition:transform .18s;cursor:pointer;margin-bottom:12px}.c:active{transform:scale(.98)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;margin-bottom:16px}
.gs{display:flex;gap:12px;padding:0 16px;overflow-x:auto;margin-bottom:16px;scroll-snap-type:x mandatory}.gs::-webkit-scrollbar{display:none}
.gs>.cdc{scroll-snap-align:start;min-width:140px;flex-shrink:0}
.st{font-size:16px;font-weight:700;padding:14px 20px 8px}

.pc{padding:16px;overflow:hidden;position:relative}
.pc .pi{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px}
.pc .pn{font-size:14px;font-weight:700;margin-bottom:3px}
.pc .pf2{font-size:11px;color:var(--text2);margin-bottom:5px}
.pc .ph{font-size:10px;color:var(--teal);margin-top:5px}
.pb{height:7px;background:rgba(15,23,42,.07);border-radius:4px;overflow:hidden}.dark .pb{background:rgba(255,255,255,.08)}
.pfl{height:100%;border-radius:4px;transition:width .5s}

.cdc{border-radius:var(--r);padding:14px;color:#fff;text-align:center;cursor:pointer;transition:transform .18s;position:relative;overflow:hidden}.cdc:active{transform:scale(.98)}
.cdc .ci{font-size:22px;margin-bottom:4px}.cdc .cv{font-size:24px;font-weight:700}.cdc .cl{font-size:10px;opacity:.92;margin-top:3px}
.cdc-blob{position:absolute;width:50px;height:50px;background:rgba(255,255,255,.08);animation:blob 8s infinite;top:-10px;right:-10px}

.ui{display:flex;align-items:center;gap:12px;padding:12px 16px;margin:0 16px 8px;background:var(--bgc);border-radius:16px;box-shadow:var(--sh)}
.ud{width:10px;height:10px;border-radius:50%;flex-shrink:0}.ut{font-size:13px;font-weight:600}.udt{font-size:11px;color:var(--text2)}

#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--bgc);box-shadow:0 -2px 15px rgba(15,23,42,.08);display:flex;align-items:center;justify-content:space-around;z-index:100;border-radius:18px 18px 0 0}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 12px;border:none;background:none;color:var(--text2);font-size:10px;font-family:inherit;transition:.25s}.ni.act{color:var(--pri)}.ni .ico{font-size:20px;transition:.25s}.ni.act .ico{transform:translateY(-2px) scale(1.08)}

.tb{display:flex;gap:8px;padding:10px 16px;overflow-x:auto}.tb::-webkit-scrollbar{display:none}
.t{padding:7px 15px;border-radius:18px;font-size:12px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:.25s;background:var(--bg);color:var(--text2);font-family:inherit}.dark .t{background:var(--bgc)}.t.act{background:var(--pri);color:#fff}

.bc{display:flex;align-items:center;gap:12px;padding:13px 16px;margin:0 16px 8px;background:var(--bgc);border-radius:var(--r);box-shadow:var(--sh);cursor:pointer;transition:transform .18s}.bc:active{transform:scale(.98)}
.bic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bi{flex:1;min-width:0}.bn{font-size:13px;font-weight:700;margin-bottom:2px}.bm{font-size:11px;color:var(--text2);margin-bottom:5px}.best{font-size:10px;color:var(--teal);margin-top:4px}

.dh{padding:14px 20px 8px;display:flex;align-items:center;gap:12px}
.bbk{width:38px;height:38px;border-radius:11px;border:none;background:var(--bgc);box-shadow:var(--sh);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:.3s}.bbk:active{transform:scale(.92)}
.dta{flex:1}.dt{font-size:17px;font-weight:700}.ds{font-size:11px;color:var(--text2);margin-top:2px}
.dpw{margin:0 16px 14px;background:var(--bgc);border-radius:14px;padding:12px 16px;box-shadow:var(--sh)}
.dsec{margin:0 16px 14px;background:var(--bgc);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.dsh{padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid rgba(15,23,42,.05)}.dark .dsh{border-color:rgba(255,255,255,.04)}

.chi{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(15,23,42,.04)}.dark .chi{border-color:rgba(255,255,255,.03)}.chi:last-child{border:none}
.cc{width:25px;height:25px;border-radius:50%;border:2.5px solid var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.25s;flex-shrink:0;margin-top:2px;font-size:12px;color:transparent}.cc.chk{border-color:var(--grn);background:var(--grn);color:#fff}
.ccnt{flex:1;min-width:0}.cnm{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.45}.cnm.dn{text-decoration:line-through;opacity:.45}
.ctp{display:inline-block;font-size:10px;padding:2px 7px;border-radius:7px;background:rgba(15,23,42,.05);color:var(--text2);margin-bottom:3px;margin-left:4px}.dark .ctp{background:rgba(255,255,255,.06)}
.cpr{display:flex;align-items:center;gap:6px;margin-top:3px}.cpr .pb{flex:1;height:5px}.cpt{font-size:10px;color:var(--text2);white-space:nowrap}
.ca{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.cb{padding:4px 9px;border-radius:7px;border:none;font-size:10px;cursor:pointer;transition:.25s;font-family:inherit;font-weight:600}.cb:active{transform:scale(.96)}
.cb.p{background:var(--bbg);color:var(--blu)}.dark .cb.p{background:rgba(37,99,235,.12)}
.cb.e{background:var(--pbg);color:var(--pur)}.dark .cb.e{background:rgba(99,102,241,.14)}
.cb.y{background:var(--obg);color:var(--warn)}.dark .cb.y{background:rgba(217,119,6,.14)}
.ed{font-size:10px;color:var(--teal);margin-top:3px}

.subtasks{margin-top:6px;padding-right:12px;border-right:2px solid rgba(15,23,42,.06)}
[dir="ltr"] .subtasks{padding-right:0;border-right:none;padding-left:12px;border-left:2px solid rgba(15,23,42,.06)}.dark .subtasks{border-color:rgba(255,255,255,.06)}
.sub-item{display:flex;align-items:center;gap:8px;padding:5px 0}
.sub-cc{width:18px;height:18px;border-radius:50%;border:2px solid var(--text2);cursor:pointer;transition:.25s;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent}.sub-cc.chk{border-color:var(--grn);background:var(--grn);color:#fff}
.sub-nm{font-size:12px;flex:1}.sub-nm.dn{text-decoration:line-through;opacity:.4}
.sub-del{background:none;border:none;font-size:12px;color:var(--red);cursor:pointer;padding:2px}

.skc{background:linear-gradient(135deg,#4338CA,#6366F1);color:#fff;border-radius:var(--r);padding:20px;margin:14px 16px;text-align:center;position:relative;overflow:hidden}
.skc .sk-blob{position:absolute;width:80px;height:80px;background:rgba(255,255,255,.08);animation:blob 10s infinite;top:-15px;right:-15px}
.skn{font-size:42px;font-weight:700}.skl{font-size:13px;opacity:.92}
.pli{display:flex;align-items:center;gap:10px;padding:11px 16px;margin:0 16px 7px;background:var(--bgc);border-radius:14px;box-shadow:var(--sh)}
.plii{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.plin{flex:1;min-width:0}.plinm{font-size:12px;font-weight:600;margin-bottom:3px}.plip{font-size:12px;font-weight:700;flex-shrink:0}
.cpg{position:relative;width:60px;height:60px;margin:0 auto 6px}.cpg svg{transform:rotate(-90deg);width:60px;height:60px}
.cpg .bg{fill:none;stroke:rgba(15,23,42,.08);stroke-width:6}.dark .cpg .bg{stroke:rgba(255,255,255,.08)}
.cpg .fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s}
.cpg .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

.gps{padding:14px 16px}
.gpr{background:linear-gradient(135deg,#4338CA,#6366F1);color:#fff;border-radius:var(--r);padding:22px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.gpr .gp-blob{position:absolute;width:70px;height:70px;background:rgba(255,255,255,.08);animation:blob 9s infinite;bottom:-10px;left:-10px}
.gpv{font-size:34px;font-weight:700}.gpg{font-size:15px;margin-top:3px;opacity:.92}
.gprw{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.gpb{background:var(--bgc);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--sh)}.gpbv{font-size:17px;font-weight:700;color:var(--pri)}.gpbl{font-size:9px;color:var(--text2);margin-top:3px}
.smc{background:var(--bgc);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:10px}
.smc h4{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.sr input{flex:1;padding:9px 10px;border:1.5px solid rgba(15,23,42,.08);border-radius:9px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text)}.dark .sr input{border-color:rgba(255,255,255,.08)}
.sr select{padding:9px 6px;border:1.5px solid rgba(15,23,42,.08);border-radius:9px;font-size:11px;background:var(--bg);color:var(--text);font-family:inherit;min-width:85px}.dark .sr select{border-color:rgba(255,255,255,.08)}
.sr .dls{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:3px}
.asb{background:var(--bbg);color:var(--blu);border:none;padding:7px 12px;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}.dark .asb{background:rgba(37,99,235,.12)}
.cgb{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#4338CA,#6366F1);color:#fff;cursor:pointer;margin-top:10px;font-family:inherit}.cgb:active{transform:scale(.98)}
.asmb{width:100%;padding:10px;border:2px dashed rgba(15,23,42,.1);border-radius:12px;font-size:13px;cursor:pointer;background:none;color:var(--text2);font-family:inherit;margin-bottom:10px}.dark .asmb{border-color:rgba(255,255,255,.08)}
.gadv{padding:12px;background:var(--obg);border-radius:12px;font-size:12px;line-height:1.6;margin-top:10px;color:var(--text)}.dark .gadv{background:rgba(217,119,6,.1)}

.sti{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bgc);margin:0 16px 7px;border-radius:14px;box-shadow:var(--sh);cursor:pointer;transition:transform .18s}.sti:active{transform:scale(.99)}
.sil{display:flex;align-items:center;gap:10px}.sii{font-size:20px}.sit{font-size:13px;font-weight:600}
.tg{width:46px;height:26px;border-radius:13px;background:rgba(15,23,42,.12);position:relative;cursor:pointer;transition:.3s;border:none;flex-shrink:0}.dark .tg{background:rgba(255,255,255,.1)}.tg.on{background:var(--pri)}
.tgk{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
[dir="rtl"] .tgk{right:3px}[dir="rtl"] .tg.on .tgk{right:23px}[dir="ltr"] .tgk{left:3px}[dir="ltr"] .tg.on .tgk{left:23px}

.mbd{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:none;opacity:0;transition:opacity .25s}.mbd.sh{display:block;opacity:1}
.mdl{position:fixed;bottom:0;left:0;right:0;background:var(--bgc);border-radius:22px 22px 0 0;z-index:201;transform:translateY(100%);transition:transform .25s;max-height:86vh;overflow-y:auto;padding:18px}.mdl.sh{transform:none}
.mh{width:36px;height:4px;background:rgba(15,23,42,.12);border-radius:2px;margin:0 auto 14px}.dark .mh{background:rgba(255,255,255,.1)}
.mdl h3{font-size:17px;font-weight:700;margin-bottom:14px}
.mi,.mdl select,.mdl textarea{width:100%;padding:11px 14px;border:2px solid rgba(15,23,42,.08);border-radius:12px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);margin-bottom:10px;transition:.25s;-webkit-appearance:none}
.dark .mi,.dark .mdl select,.dark .mdl textarea{border-color:rgba(255,255,255,.08)}
.mi:focus,.mdl select:focus,.mdl textarea:focus{outline:none;border-color:var(--pri)}
.mdl textarea{resize:vertical;min-height:60px}
.mb{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:.25s;font-family:inherit;margin-bottom:7px}
.mb.pr{background:linear-gradient(135deg,#4338CA,#6366F1);color:#fff}.mb.dg{background:var(--red);color:#fff}.mb.sc{background:var(--bg);color:var(--text)}.mb:active{transform:scale(.98)}
.m-row{display:flex;gap:8px;margin-bottom:10px}.m-row>*{flex:1}
.qbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.qbtn{padding:8px 10px;border:none;border-radius:10px;background:var(--bbg);color:var(--blu);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}.dark .qbtn{background:rgba(37,99,235,.12)}
.hint{font-size:11px;color:var(--text2);margin:-4px 0 10px}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bgc);color:var(--text);padding:10px 20px;border-radius:12px;box-shadow:0 6px 25px rgba(15,23,42,.14);z-index:300;font-size:13px;font-weight:600;transition:transform .35s;white-space:nowrap;max-width:90vw}#toast.sh{transform:translateX(-50%) translateY(0)}
.emp{text-align:center;padding:35px 20px;color:var(--text2)}.emp .ei{font-size:42px;margin-bottom:10px;animation:float 3s ease-in-out infinite}.emp .et{font-size:13px;line-height:1.5}
.sbh{background:var(--bgc);padding:14px 20px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}.sbt{font-size:16px;font-weight:700}
.abc{margin:16px;padding:18px;background:var(--bgc);border-radius:var(--r);box-shadow:var(--sh);text-align:center}.abc .ai{font-size:40px;margin-bottom:10px;animation:float 3s ease-in-out infinite}.abc h3{font-size:17px;font-weight:700;margin-bottom:6px}.abc p{font-size:12px;color:var(--text2);line-height:1.5}
.nir{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:14px}
.nir input[type="number"]{width:86px;text-align:center;padding:8px;border:2px solid rgba(15,23,42,.08);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}.dark .nir input[type="number"]{border-color:rgba(255,255,255,.08)}

.sticky-zone{background:var(--bg);padding:8px 16px 10px}
.sticky-zone.hh{position:sticky;top:56px;z-index:8}
.sticky-zone.tt{position:sticky;top:0;z-index:8}
.daystrip{background:var(--bgc);border-radius:14px;padding:12px 14px;box-shadow:var(--sh)}
.daystrip-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px}
.daystrip-title{font-size:12px;font-weight:700}
.daystrip-btn{border:none;background:var(--bbg);color:var(--blu);padding:5px 9px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}.dark .daystrip-btn{background:rgba(37,99,235,.12)}
.daystrip-metrics{display:flex;justify-content:space-between;gap:8px;font-size:10px;color:var(--text2);margin-top:4px}
.daystrip-metrics span{white-space:nowrap}
.daystrip-over{color:var(--red)!important}
.home-mini{margin-top:8px}
.home-mini .hdr-box{margin-top:8px}

.day-wrap{padding:10px 16px 16px}
.day-head{font-size:12px;color:var(--text2);margin-bottom:10px}
.alloc-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.alloc-item{display:flex;align-items:center;gap:10px;background:var(--bgc);border-radius:12px;padding:10px 12px;box-shadow:var(--sh)}
.alloc-main{flex:1;min-width:0}
.alloc-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alloc-meta{font-size:10px;color:var(--text2);margin-top:2px}
.alloc-del{border:none;background:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px}
.hour-grid{margin-top:8px;background:var(--bgc);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.hour-row{display:grid;grid-template-columns:58px 1fr;align-items:center;gap:8px;min-height:20px;padding:4px 10px;border-bottom:1px solid rgba(15,23,42,.05);cursor:pointer}
.dark .hour-row{border-color:rgba(255,255,255,.04)}
.hour-row:last-child{border-bottom:none}
.hour-time{font-size:10px;font-weight:700;color:var(--pri)}
.hour-task{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.hour-task.fill{color:var(--text);font-weight:600}
.plan-mini{font-size:10px;color:var(--text2);margin-top:2px}
.plan-box{background:var(--bg);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.small-note{font-size:11px;color:var(--text2);line-height:1.6}

function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;')}
function parseLocalDate(ds){var p=String(ds).split('-');return new Date(+p[0],(+p[1])-1,+p[2],12,0,0,0)}
function noonToday(){var d=new Date();d.setHours(12,0,0,0);return d}
function todayKey(){var d=new Date(),m=('0'+(d.getMonth()+1)).slice(-2),da=('0'+d.getDate()).slice(-2);return d.getFullYear()+'-'+m+'-'+da}
function dU(ds){return Math.max(0,Math.ceil((parseLocalDate(ds)-noonToday())/864e5))}
function dFrom(ds){return Math.max(0,Math.floor((noonToday()-parseLocalDate(ds))/864e5))}
function fD(ds){var d=parseLocalDate(ds),m=S.lang==='ar'?['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+d.getFullYear()}
function gr(){var h=new Date().getHours();return h<12?t('gm'):h<18?t('ga'):t('ge')}
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('sh');setTimeout(function(){e.classList.remove('sh')},2000)}
function gC(rid){return{root_arabic:'#2F855A',root_nlp:'#4F46E5',root_reading:'#B45309'}[rid]||'#4F46E5'}
function gBg(rid){return{root_arabic:'var(--gbg)',root_nlp:'var(--pbg)',root_reading:'var(--obg)'}[rid]||'var(--pbg)'}
function getItemData(iid){if(S.editedItems[iid])return S.editedItems[iid];var f=null;DATA.roots.forEach(function(r){r.branches.forEach(function(b){b.sections.forEach(function(s){s.items.forEach(function(it){if(it.id===iid)f=it})})})});return f}
function getRootId(bid){for(var i=0;i<DATA.roots.length;i++){if(DATA.roots[i].branches.find(function(b){return b.id===bid}))return DATA.roots[i].id}return''}
function findItemMeta(iid){
  var out=null;
  DATA.roots.forEach(function(r){r.branches.forEach(function(b){b.sections.forEach(function(s){s.items.forEach(function(it){if(it.id===iid)out={item:getItemData(it.id)||it,rid:r.id,bid:b.id,branch:b,section:s}})})})});
  return out;
}
function unitLabel(tp){return tp==='book'?t('pages'):tp==='video'?t('sections'):t('units')}
function updStreak(){var td=new Date().toDateString();if(S.streak.ld===td)return;var yd=new Date(Date.now()-864e5).toDateString();if(S.streak.ld===yd)S.streak.c++;else if(S.streak.ld!==td)S.streak.c=1;S.streak.ld=td;sv()}
function todayIso(d){var m=('0'+(d.getMonth()+1)).slice(-2),da=('0'+d.getDate()).slice(-2);return d.getFullYear()+'-'+m+'-'+da}

function ensureDayPlan(ds){
  if(!S.dailyPlan.days[ds])S.dailyPlan.days[ds]={allocations:[],slots:emptyDaySlots()};
  if(!Array.isArray(S.dailyPlan.days[ds].allocations))S.dailyPlan.days[ds].allocations=[];
  if(!S.dailyPlan.days[ds].slots)S.dailyPlan.days[ds].slots=emptyDaySlots();
  for(var i=0;i<24;i++){var k=(i<10?'0':'')+i;if(typeof S.dailyPlan.days[ds].slots[k]==='undefined')S.dailyPlan.days[ds].slots[k]=null}
  return S.dailyPlan.days[ds];
}
function dayBudgetHours(ds){return Number(S.dailyPlan.overrides[ds]||S.dailyPlan.baseHours||S.dailyHours||3)}
function dayBudgetMin(ds){return Math.round(dayBudgetHours(ds)*60)}
function dayAllocations(ds){return ensureDayPlan(ds).allocations}
function daySlots(ds){return ensureDayPlan(ds).slots}
function dayUsedMin(ds){var n=0;dayAllocations(ds).forEach(function(a){n+=Number(a.minutes||0)});return n}
function dayRemainMin(ds){return dayBudgetMin(ds)-dayUsedMin(ds)}
function fmtMin(min){min=Math.round(Math.max(0,Math.abs(min||0)));var h=Math.floor(min/60),m=min%60;if(S.lang==='ar'){if(h&&m)return h+'س '+m+'د';if(h)return h+'س';return m+'د'}else{if(h&&m)return h+'h '+m+'m';if(h)return h+'h';return m+'m'}}
function fmtSignedMin(min){if(min<0)return '-'+fmtMin(min);return fmtMin(min)}
function todayPlannedCount(ds){return dayAllocations(ds).length}
function plannedMinForItem(iid,ds){var n=0;dayAllocations(ds).forEach(function(a){if(a.itemId===iid)n+=Number(a.minutes||0)});return n}
function uniquePlannedItems(ds){var map={},arr=[];dayAllocations(ds).forEach(function(a){if(a.itemId&&!map[a.itemId]){map[a.itemId]=1;arr.push(a.itemId)}});return arr}
function addTodayAllocation(iid,minutes,extra){var ds=todayKey(),day=ensureDayPlan(ds);day.allocations.push({id:'a'+Date.now()+Math.random().toString(36).slice(2,6),itemId:iid,minutes:minutes,note:extra||'',createdAt:Date.now()});sv()}
function removeTodayAllocation(aid){
  var ds=todayKey(),day=ensureDayPlan(ds),removedItem=null;
  day.allocations=day.allocations.filter(function(a){if(a.id===aid){removedItem=a.itemId;return false}return true});
  if(removedItem){
    var stillExists=false;day.allocations.forEach(function(a){if(a.itemId===removedItem)stillExists=true});
    if(!stillExists){for(var k in day.slots){if(day.slots[k]===removedItem)day.slots[k]=null}}
  }
  sv();
}

function renderDayStripHtml(){
  var ds=todayKey(),budget=dayBudgetMin(ds),used=dayUsedMin(ds),left=budget-used,count=todayPlannedCount(ds),pct=budget?Math.min(100,Math.round((used/budget)*100)):0;
  var col=left>=60?'var(--grn)':left>=0?'var(--warn)':'var(--red)';
  return '<div class="daystrip">'+
    '<div class="daystrip-top"><div class="daystrip-title">'+t('todayTitle')+'</div><button class="daystrip-btn" onclick="openTodayHours()">'+dayBudgetHours(ds)+' '+t('hDay')+'</button></div>'+
    '<div class="pb"><div class="pfl" style="width:'+pct+'%;background:'+col+'"></div></div>'+
    '<div class="daystrip-metrics">'+
      '<span>'+t('planned')+': <b>'+fmtMin(used)+'</b></span>'+
      '<span class="'+(left<0?'daystrip-over':'')+'">'+(left<0?t('over'):t('left'))+': <b>'+fmtSignedMin(left)+'</b></span>'+
      '<span>'+count+' '+t('tasksCount')+'</span>'+
    '</div></div>';
}

function openHourPicker(hourKey){

function itemHours(it,rid){var item=getItemData(it.id)||it;var rate=RATES[rid]||RATES.root_arabic;if(!item.total)return 1;return Math.round(item.total*(rate[item.type]||4)/60*10)/10}
function itemRemainHours(it,rid){if(S.ck[it.id])return 0;var item=getItemData(it.id)||it;var rate=RATES[rid]||RATES.root_arabic;if(!item.total)return 0;var prog=S.ip[it.id]||0,rem=Math.max(0,item.total-prog);return Math.round(rem*(rate[item.type]||4)/60*10)/10}
function allItems(){var a=[];DATA.roots.forEach(function(r){r.branches.forEach(function(b){b.sections.forEach(function(s){s.items.forEach(function(it){if(!S.hiddenItems[it.id])a.push({i:getItemData(it.id)||it,bid:b.id,rid:r.id})})})})});return a}
function bProg(bid){var tot=0,dn=0;DATA.roots.forEach(function(r){r.branches.forEach(function(b){if(b.id===bid)b.sections.forEach(function(s){s.items.forEach(function(it){if(!S.hiddenItems[it.id]){tot++;if(S.ck[it.id])dn++}})})})});return{d:dn,t:tot,p:tot?Math.round(dn/tot*100):0}}
function rProg(rid){var tot=0,dn=0;var r=DATA.roots.find(function(x){return x.id===rid});if(!r)return{d:0,t:0,p:0};r.branches.forEach(function(b){b.sections.forEach(function(s){s.items.forEach(function(it){if(!S.hiddenItems[it.id]){tot++;if(S.ck[it.id])dn++}})})});return{d:dn,t:tot,p:tot?Math.round(dn/tot*100):0}}
function totalNeeded(){var h=0;allItems().forEach(function(x){h+=itemRemainHours(x.i,x.rid)});return Math.round(h)}
function doneHours(){var h=0;allItems().forEach(function(x){if(S.ck[x.i.id])h+=itemHours(x.i,x.rid)});return Math.round(h)}
function availHours(){return Math.max(0,dU(DATA.countdowns[0].date))*S.dailyHours}
function branchHrs(bid){var t=0,r=0,rid=getRootId(bid);DATA.roots.forEach(function(rt){rt.branches.forEach(function(b){if(b.id===bid)b.sections.forEach(function(s){s.items.forEach(function(it){if(!S.hiddenItems[it.id]){t+=itemHours(it,rid);r+=itemRemainHours(it,rid)}})})})});return{t:Math.round(t),r:Math.round(r)}}
function rootHrs(rid){var t=0,r=0;var rt=DATA.roots.find(function(x){return x.id===rid});if(!rt)return{t:0,r:0};rt.branches.forEach(function(b){b.sections.forEach(function(s){s.items.forEach(function(it){if(!S.hiddenItems[it.id]){t+=itemHours(it,rid);r+=itemRemainHours(it,rid)}})})});return{t:Math.round(t),r:Math.round(r)}}
function estDate(it,rid){var item=getItemData(it.id)||it;if(!item.total)return null;var hrs=itemRemainHours(it,rid);if(hrs<=0)return null;var days=Math.ceil(hrs/S.dailyHours);var d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString(S.lang==='ar'?'ar-EG':'en-US',{year:'numeric',month:'short',day:'numeric'})}
function estBranch(bid){var hrs=branchHrs(bid).r;if(hrs<=0)return null;var days=Math.ceil(hrs/S.dailyHours);var d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString(S.lang==='ar'?'ar-EG':'en-US',{year:'numeric',month:'short',day:'numeric'})}
function cdDisplay(id,days){var m=S.cdMode[id]||'d';if(m==='w')return{v:Math.ceil(days/7),u:t('weeksUnit')};if(m==='m')return{v:Math.ceil(days/30),u:t('monthsUnit')};return{v:days,u:t('daysUnit')}}
function toggleCdMode(id){var m=S.cdMode[id]||'d';S.cdMode[id]=m==='d'?'w':m==='w'?'m':'d';sv();rHome()}

function nextOB(n){document.querySelectorAll('.ob-slide').forEach(function(s){s.classList.remove('act')});document.getElementById('ob'+n).classList.add('act')}
function skipOB(){S.onboarded=true;sv();document.getElementById('onboard').classList.add('hide')}

function nav(pg,flt,isBack){
  showPage(pg,!!isBack);
  document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('act',n.dataset.p===pg)});
  S.pp=S.cp;S.cp=pg;
  if(pg==='home')rHome();
  else if(pg==='paths'){if(flt)S.pf=flt;rPaths()}
  else if(pg==='timeline')rTimeline();
  else if(pg==='stats')rStats();
  else if(pg==='settings')rSettings();
  sv();
}
document.querySelectorAll('.ni').forEach(function(b){b.addEventListener('click',function(){nav(b.dataset.p)})});
function goBack(){nav(S.pp||'paths',null,true)}
function openDet(bid){S.detBr=bid;S.pp='paths';showPage('detail',false);S.cp='detail';rDetail(bid)}
function showMdl(){document.getElementById('mbd').classList.add('sh');document.getElementById('mdl').classList.add('sh')}
function closeMdl(){document.getElementById('mbd').classList.remove('sh');document.getElementById('mdl').classList.remove('sh')}

function rHome(){
  refreshDynamicCountdowns();
  document.getElementById('greet').textContent=gr();
  document.getElementById('motiv').textContent=getMotiv();
  document.getElementById('h-pt-t').textContent=t('mp');
  document.getElementById('h-cd-t').textContent=t('cds');
  document.getElementById('h-up-t').textContent=t('upc');

  var gradDate=DATA.countdowns[0].date,startDate=DATA.journeyStart;
  var totalDays=Math.ceil((parseLocalDate(gradDate)-parseLocalDate(startDate))/(864e5));
  var elapsed=dFrom(startDate),remaining=Math.max(0,dU(gradDate));
  var gradPct=Math.min(100,Math.round(elapsed/totalDays*100));
  var gh='<div class="hdr-box"><div class="hdr-box-title"><span>'+((S.lang==='ar')?'التخرج':'Graduation')+'</span><span>'+gradPct+'%</span></div>';
  gh+='<div class="hdr-bar"><div class="hdr-bar-fill" style="width:'+gradPct+'%;background:#fff"></div></div>';
  gh+='<div class="hdr-bar-info"><span>'+t('elapsed')+': '+elapsed+' '+t('daysUnit')+'</span><span>'+t('remaining')+': '+remaining+' '+t('daysUnit')+'</span></div></div>';
  document.getElementById('hdr-grad').innerHTML=gh;

  var needed=totalNeeded(),avail=availHours(),done=doneHours();
  var budPct=avail>0?Math.min(100,Math.round(needed/avail*100)):100;
  var budCol=budPct<=70?'#16A34A':budPct<=90?'#D97706':'#DC2626';
  var reserve=Math.max(0,avail-needed);
  var bh='<div class="hdr-box"><div class="hdr-box-title"><span>'+t('budget')+'</span><span onclick="openDailyHours()" style="cursor:pointer">'+S.dailyHours+' '+t('hDay')+'</span></div>';
  bh+='<div class="hdr-bar"><div class="hdr-bar-fill" style="width:'+budPct+'%;background:'+budCol+'"></div></div>';
  bh+='<div class="hdr-bar-info"><span>'+t('needed')+': <b>'+needed+'</b> '+t('hour')+'</span><span>'+t('available')+': <b>'+avail+'</b> '+t('hour')+'</span></div>';
  bh+='<div class="hdr-bar-info" style="margin-top:3px"><span>'+t('done2')+': <b>'+done+'</b></span><span style="color:#fff">'+t('reserve')+': <b>'+reserve+'</b></span></div></div>';
  document.getElementById('hdr-budget').innerHTML=bh;
  renderHomeDailyBox();

  var ph='';
  DATA.roots.forEach(function(r){
    var p=rProg(r.id),cl=gC(r.id),bg=gBg(r.id),nm=S.lang==='ar'?r.name:r.nameEn,rh=rootHrs(r.id);
    ph+='<div class="c pc" style="background:'+bg+'" onclick="nav(\'paths\',\''+r.id+'\')">';
    ph+='<div class="pi" style="background:'+cl+';color:#fff">'+r.icon+'</div>';
    ph+='<div class="pn">'+nm+'</div>';
    ph+='<div class="pf2">'+p.d+'/'+p.t+' '+t('items')+'</div>';
    ph+='<div class="pb"><div class="pfl" style="width:'+p.p+'%;background:'+cl+'"></div></div>';
    if(rh.r>0)ph+='<div class="ph">'+rh.r+' '+t('hRemain')+'</div>';
    ph+='</div>';
  });
  document.getElementById('h-paths').innerHTML=ph;

  var cds=DATA.countdowns.map(function(c){return{o:c,d:Math.max(0,dU(c.date))}}).sort(function(a,b){return a.d-b.d});
  var cols=['linear-gradient(135deg,#4338CA,#6366F1)','linear-gradient(135deg,#2563EB,#0EA5E9)','linear-gradient(135deg,#2F855A,#16A34A)','linear-gradient(135deg,#B45309,#D97706)','linear-gradient(135deg,#475569,#64748B)'];
  var cdH='';
  cds.forEach(function(c,i){var dd=cdDisplay(c.o.id,c.d);var lb=S.lang==='ar'?c.o.name:c.o.nameEn;cdH+='<div class="cdc" style="background:'+cols[i%5]+'" onclick="toggleCdMode(\''+c.o.id+'\')"><div class="cdc-blob"></div><div class="ci">'+c.o.icon+'</div><div class="cv">'+dd.v+'</div><div class="cl">'+dd.u+' · '+lb+'</div></div>'});
  document.getElementById('h-cds').innerHTML=cdH;

  var upE=[];DATA.countdowns.forEach(function(c){if(dU(c.date)>0)upE.push(c)});upE.sort(function(a,b){return dU(a.date)-dU(b.date)});upE=upE.slice(0,3);
  var upH='';
  if(upE.length){upE.forEach(function(e){var lb=S.lang==='ar'?e.name:e.nameEn;upH+='<div class="ui"><div class="ud" style="background:var(--pri)"></div><div style="flex:1"><div class="ut">'+lb+'</div><div class="udt">'+fD(e.date)+' · '+dU(e.date)+' '+t('daysUnit')+'</div></div></div>'})}
  else upH='<div class="emp"><div class="ei">•</div><div class="et">'+t('noUp')+'</div></div>';
  document.getElementById('h-up').innerHTML=upH;
}
function openDailyHours(){
  document.getElementById('mdl').innerHTML='<div class="mh"></div><h3>'+t('budget')+'</h3><div class="nir"><input type="number" id="dh-inp" value="'+S.dailyHours+'" min="1" max="12" step="0.5"><span>'+t('hDay')+'</span></div><div id="dh-prev" style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:14px"></div><button class="mb pr" onclick="svDH()">'+t('save')+'</button><button class="mb sc" onclick="closeMdl()">'+t('cancel')+'</button>';
  var inp=document.getElementById('dh-inp');
  function upd(){var h=parseFloat(inp.value)||3;var av=Math.max(0,dU(DATA.countdowns[0].date))*h;var nd=totalNeeded();var ok=av>=nd;document.getElementById('dh-prev').innerHTML=t('available')+': <b>'+Math.round(av)+'</b> '+t('hour')+' · '+t('needed')+': <b>'+nd+'</b> '+t('hour')+' · '+(ok?'OK':'Tight')}
  inp.addEventListener('input',upd);upd();showMdl();
}
function svDH(){S.dailyHours=Math.max(.5,parseFloat(document.getElementById('dh-inp').value)||3);S.dailyPlan.baseHours=S.dailyHours;sv();closeMdl();rHome();renderAllDayStrips();toast('✓')}

function rPaths(){
  document.getElementById('paths-t').textContent=t('pathsT');
  renderStripTo('paths-day-strip');

function sPF(f){S.pf=f;rPaths();sv()}

function rDetail(bid){
  var branch=null,rid='';
  DATA.roots.forEach(function(r){var b=r.branches.find(function(x){return x.id===bid});if(b){branch=b;rid=r.id}});
  if(!branch)return;
  renderStripTo('detail-day-strip');
  var cl=gC(rid),nm=S.lang==='ar'?branch.name:branch.nameEn,p=bProg(bid),bh=branchHrs(bid),eb=estBranch(bid);
  document.getElementById('d-title').textContent=branch.icon+' '+nm;
  document.getElementById('d-sub').textContent=p.d+'/'+p.t+' '+t('items')+(bh.r>0?' · '+bh.r+t('hour'):'');
  document.getElementById('bkb').textContent=S.lang==='ar'?'→':'←';
  var progH='<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:600">'+t('prog')+'</span><span style="font-size:12px;font-weight:700;color:'+cl+'">'+p.p+'%</span></div><div class="pb" style="height:9px"><div class="pfl" style="width:'+p.p+'%;background:'+cl+'"></div></div>';
  if(eb&&p.p<100)progH+='<div style="font-size:11px;color:var(--teal);margin-top:6px">'+t('estBranch')+': '+eb+'</div>';
  document.getElementById('d-prog').innerHTML=progH;

  var sh='',ds=todayKey();
  branch.sections.forEach(function(sec){
    var sn=S.lang==='ar'?sec.name:sec.nameEn;
    sh+='<div class="dsec"><div class="dsh" style="color:'+cl+'">'+sn+'</div>';
    sec.items.forEach(function(it){
      if(S.hiddenItems[it.id])return;
      var item=getItemData(it.id)||it,ck=S.ck[it.id],pg=S.ip[it.id]||0;
      var tl=item.type==='book'?t('book'):item.type==='video'?t('video'):t('practice');
      var hp=item.type==='book'||item.type==='video',tv=item.total||0,un=unitLabel(item.type),ih=itemHours(it,rid),es=hp?estDate(it,rid):null,subs=S.subtasks[it.id]||[];
      var plannedToday=plannedMinForItem(it.id,ds);

      sh+='<div class="chi"><div class="cc'+(ck?' chk':'')+'" onclick="tgCk(\''+it.id+'\',\''+bid+'\')">'+(ck?'✓':'')+'</div><div class="ccnt">';
      sh+='<div class="cnm'+(ck?' dn':'')+'">'+escapeHtml(item.name)+(item.star?' ★':'')+'</div>';
      sh+='<span class="ctp">'+tl+(tv?' · '+tv+' '+un:'')+'</span>';
      sh+='<span class="ctp" style="background:var(--bbg);color:var(--blu)">~'+ih+t('hour')+'</span>';
      if(plannedToday>0)sh+='<span class="ctp" style="background:var(--obg);color:var(--warn)">'+t('plannedForToday')+' '+fmtMin(plannedToday)+'</span>';

      if(hp&&tv){var pp=Math.min(100,Math.round(pg/tv*100));sh+='<div class="cpr"><div class="pb"><div class="pfl" style="width:'+pp+'%;background:var(--grn)"></div></div><span class="cpt">'+pg+'/'+tv+'</span></div>';if(es&&!ck)sh+='<div class="ed">'+t('estF')+': '+es+'</div>'}

      if(subs.length){
        sh+='<div class="subtasks">';
        subs.forEach(function(sub,si){sh+='<div class="sub-item"><div class="sub-cc'+(sub.dn?' chk':'')+'" onclick="tgSub(\''+it.id+'\','+si+',\''+bid+'\')">'+(sub.dn?'✓':'')+'</div><div class="sub-nm'+(sub.dn?' dn':'')+'">'+escapeHtml(sub.nm)+'</div><button class="sub-del" onclick="delSub2(\''+it.id+'\','+si+',\''+bid+'\')">✕</button></div>'});
        sh+='</div>';
      }

      sh+='<div class="ca">';
      if(hp&&tv)sh+='<button class="cb p" onclick="openProg(\''+it.id+'\','+tv+',\''+un+'\',\''+bid+'\')">'+t('updProg')+'</button>';
      sh+='<button class="cb y" onclick="openPlanItem(\''+it.id+'\',\''+bid+'\')">'+t('planToday')+'</button>';
      sh+='<button class="cb e" onclick="openEdit(\''+it.id+'\',\''+bid+'\')">'+t('edit')+'</button>';
      sh+='<button class="cb p" onclick="openAddSub(\''+it.id+'\',\''+bid+'\')">'+t('addSub2')+'</button>';
      sh+='</div></div></div>';
    });
    sh+='</div>';
  });
  document.getElementById('d-secs').innerHTML=sh;
}
function tgCk(iid,bid){S.ck[iid]=!S.ck[iid];if(S.ck[iid])updStreak();sv();rDetail(bid);toast(S.ck[iid]?t('markDone'):t('markUn'))}
function openProg(iid,tot,un,bid){var cur=S.ip[iid]||0;document.getElementById('mdl').innerHTML='<div class="mh"></div><h3>'+t('updProg')+'</h3><div class="nir"><input type="number" id="pinp" value="'+cur+'" min="0" max="'+tot+'"><span>/ '+tot+' '+un+'</span></div><div class="pb" style="height:9px;margin-bottom:14px"><div class="pfl" style="width:'+Math.round(cur/tot*100)+'%;background:var(--grn)" id="pprev"></div></div><button class="mb pr" onclick="svProg(\''+iid+'\','+tot+',\''+bid+'\')">'+t('save')+'</button><button class="mb sc" onclick="closeMdl()">'+t('cancel')+'</button>';document.getElementById('pinp').addEventListener('input',function(){var v=Math.min(tot,Math.max(0,parseInt(this.value,10)||0));document.getElementById('pprev').style.width=Math.round(v/tot*100)+'%'});showMdl()}
function svProg(iid,tot,bid){var v=Math.min(tot,Math.max(0,parseInt(document.getElementById('pinp').value,10)||0));S.ip[iid]=v;S.ck[iid]=v>=tot;sv();closeMdl();rDetail(bid);toast(t('progSaved'))}
function openEdit(iid,bid){var item=getItemData(iid);if(!item)return;var types='<option value="book"'+(item.type==='book'?' selected':'')+'>'+t('book')+'</option><option value="video"'+(item.type==='video'?' selected':'')+'>'+t('video')+'</option><option value="practice"'+(item.type==='practice'?' selected':'')+'>'+t('practice')+'</option>';document.getElementById('mdl').innerHTML='<div class="mh"></div><h3>'+t('editItem')+'</h3><input class="mi" id="ename" value="'+escapeHtml(item.name)+'"><div class="m-row"><select id="etype">'+types+'</select><input class="mi" type="number" id="etotal" value="'+(item.total||0)+'" style="margin:0"></div><button class="mb pr" onclick="svEdit(\''+iid+'\',\''+bid+'\')">'+t('save')+'</button><button class="mb dg" onclick="delItem(\''+iid+'\',\''+bid+'\')">'+t('del')+'</button><button class="mb sc" onclick="closeMdl()">'+t('cancel')+'</button>';showMdl()}
function svEdit(iid,bid){var nm=document.getElementById('ename').value.trim();if(!nm)return;S.editedItems[iid]={id:iid,name:nm,type:document.getElementById('etype').value,total:parseInt(document.getElementById('etotal').value,10)||0,star:(getItemData(iid)||{}).star};sv();closeMdl();rDetail(bid);toast('✓')}
function delItem(iid,bid){S.hiddenItems[iid]=true;sv();closeMdl();rDetail(bid);toast('✓')}
function openAddSub(iid,bid){document.getElementById('mdl').innerHTML='<div class="mh"></div><h3>'+t('addSub2')+'</h3><input class="mi" id="snm" placeholder="'+t('addSubtask')+'"><button class="mb pr" onclick="svSub(\''+iid+'\',\''+bid+'\')">'+t('save')+'</button><button class="mb sc" onclick="closeMdl()">'+t('cancel')+'</button>';showMdl()}
function svSub(iid,bid){var nm=document.getElementById('snm').value.trim();if(!nm)return;if(!S.subtasks[iid])S.subtasks[iid]=[];S.subtasks[iid].push({nm:nm,dn:false});sv();closeMdl();rDetail(bid);toast('✓')}
function syncParentCompletion(itemId){var subs=S.subtasks[itemId]||[];if(!subs.length)return;S.ck[itemId]=subs.every(function(s){return s.dn})}
function tgSub(iid,si,bid){if(S.subtasks[iid]&&S.subtasks[iid][si]){S.subtasks[iid][si].dn=!S.subtasks[iid][si].dn;syncParentCompletion(iid);sv();rDetail(bid)}}
function delSub2(iid,si,bid){if(S.subtasks[iid]){S.subtasks[iid].splice(si,1);syncParentCompletion(iid);sv();rDetail(bid)}}

function rTimeline(){
  document.getElementById('tl-t').textContent=t('todayTitle');
  renderStripTo('timeline-day-strip');
  var ds=todayKey(),allocs=dayAllocations(ds),slots=daySlots(ds),h='';
  h+='<div class="day-head">'+t('dayBoardHint')+'</div>';

  if(allocs.length){
    h+='<div class="alloc-list">';
    allocs.forEach(function(a){var item=getItemData(a.itemId);if(!item)return;h+='<div class="alloc-item"><div class="alloc-main"><div class="alloc-name">'+escapeHtml(item.name)+'</div><div class="alloc-meta">'+fmtMin(a.minutes)+(a.note?' · '+escapeHtml(a.note):'')+'</div></div><button class="alloc-del" onclick="removeTodayAllocation(\''+a.id+'\');rTimeline();renderAllDayStrips();if(S.detBr)rDetail(S.detBr)">✕</button></div>'});
    h+='</div>';
  }else h+='<div class="emp" style="padding:22px 10px"><div class="ei">•</div><div class="et">'+t('noTodayTasks')+'</div></div>';

function rStatsOv(){
  var h='<div class="skc"><div class="sk-blob"></div><div class="skn">'+S.streak.c+'</div><div class="skl">'+t('streakT')+'</div></div>';
  var tp=Math.round(allItems().filter(function(x){return S.ck[x.i.id]}).length/Math.max(1,allItems().length)*100),circ=175.9;
  h+='<div style="text-align:center;padding:10px 0 16px"><div class="cpg" style="width:70px;height:70px;margin:0 auto 8px"><svg viewBox="0 0 64 64" style="width:70px;height:70px"><circle class="bg" cx="32" cy="32" r="28"/><circle class="fg" cx="32" cy="32" r="28" style="stroke:var(--pri);stroke-dasharray:'+circ+';stroke-dashoffset:'+circ*(1-tp/100)+'"/></svg><div class="pct" style="color:var(--pri);font-size:15px">'+tp+'%</div></div><div style="font-size:14px;font-weight:700">'+t('prog')+'</div></div>';
  DATA.roots.forEach(function(r){var cl=gC(r.id),bg=gBg(r.id);r.branches.forEach(function(b){var p=bProg(b.id),nm=S.lang==='ar'?b.name:b.nameEn;h+='<div class="pli"><div class="plii" style="background:'+bg+';color:'+cl+'">'+b.icon+'</div><div class="plin"><div class="plinm">'+nm+'</div><div class="pb"><div class="pfl" style="width:'+p.p+'%;background:'+cl+'"></div></div></div><div class="plip" style="color:'+cl+'">'+p.p+'%</div></div>'})});
  document.getElementById('s-cnt').innerHTML=h;
}
function rStatsGpa(){
  var h='<div class="gps">';
  if(S.gpaR){h+='<div class="gpr"><div class="gp-blob"></div><div class="gpv">'+S.gpaR.grade+'</div><div class="gpg">'+S.gpaR.gradeEn+'</div></div><div class="gprw"><div class="gpb"><div class="gpbv">'+S.gpaR.gpa4+'</div><div class="gpbl">'+t('gpa4')+'</div></div><div class="gpb"><div class="gpbv">'+S.gpaR.uk+'</div><div class="gpbl">'+t('ukClass')+'</div></div><div class="gpb"><div class="gpbv">'+S.gpaR.avg+'</div><div class="gpbl">'+t('cumGrade')+'</div></div></div><div class="gadv">'+t('advGpa')+S.gpaR.advice+'</div>'}
  S.gpa.sems.forEach(function(sem,si){
    h+='<div class="smc"><h4>'+t('sem')+' '+(si+1)+'<button class="dls" onclick="delSem('+si+')" style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer">✕</button></h4>';
    sem.subs.forEach(function(sub,sbi){h+='<div class="sr"><input placeholder="'+t('subName')+'" value="'+escapeHtml(sub.n)+'" onchange="updSubG('+si+','+sbi+',this.value)"><select onchange="updGrd('+si+','+sbi+',this.value)">';['excellent','vgood','good','pass','weak','vweak'].forEach(function(g){h+='<option value="'+g+'"'+(sub.g===g?' selected':'')+'>'+t(g)+'</option>'});h+='</select><button class="dls" onclick="delSubG('+si+','+sbi+')">✕</button></div>'});
    h+='<button class="asb" onclick="addSubG('+si+')">'+t('addSub')+'</button></div>'});
  h+='<button class="asmb" onclick="addSem()">'+t('addSem')+'</button><button class="cgb" onclick="calcGpa()">'+t('calcGpa')+'</button></div>';
  document.getElementById('s-cnt').innerHTML=h;
}
function updSubG(si,sbi,v){S.gpa.sems[si].subs[sbi].n=v;sv()}
function updGrd(si,sbi,v){S.gpa.sems[si].subs[sbi].g=v;sv()}
function addSubG(si){S.gpa.sems[si].subs.push({n:'',g:'excellent'});sv();rStatsGpa()}
function delSubG(si,sbi){S.gpa.sems[si].subs.splice(sbi,1);sv();rStatsGpa()}
function addSem(){S.gpa.sems.push({id:S.gpa.sems.length+1,subs:[{n:'',g:'excellent'}]});sv();rStatsGpa()}
function delSem(si){if(S.gpa.sems.length<=1)return;S.gpa.sems.splice(si,1);sv();rStatsGpa()}
function calcGpa(){
  var pts={excellent:4,vgood:3,good:2,pass:1,weak:0,vweak:0},tot=0,cnt=0;
  S.gpa.sems.forEach(function(sem){sem.subs.forEach(function(sub){tot+=pts[sub.g]||0;cnt++})});
  if(!cnt)return toast('⚠️');var avg=tot/cnt;var g,ge,g4,uk,adv;
  if(avg>=3.5){g='ممتاز';ge='Excellent';g4='4.0';uk='First Class';adv=t('adv1')}
  else if(avg>=2.5){g='جيد جداً';ge='Very Good';g4='3.0';uk='2:1';adv=t('adv2')}
  else if(avg>=1.5){g='جيد';ge='Good';g4='2.5';uk='2:2';adv=t('adv2')}
  else if(avg>=1){g='مقبول';ge='Pass';g4='2.0';uk='Third';adv=t('adv3')}
  else{g='ضعيف';ge='Weak';g4='1.0';uk='Fail';adv=t('adv3')}
  S.gpaR={grade:g,gradeEn:ge,gpa4:g4,uk:uk,avg:avg.toFixed(2),advice:adv};sv();rStatsGpa();toast('✓');
}

function rSettings(){
  document.getElementById('set-t').textContent=t('settingsT');document.getElementById('abt').textContent=t('about');
  document.getElementById('set-list').innerHTML=
    '<div class="sti" onclick="toggleDark()"><div class="sil"><span class="sii">🌙</span><span class="sit">'+t('darkM')+'</span></div><div class="tg'+(S.dark?' on':'')+'"><div class="tgk"></div></div></div>'+
    '<div class="sti" onclick="toggleLang()"><div class="sil"><span class="sii">🌐</span><span class="sit">'+t('langS')+'</span></div><div style="font-size:13px;font-weight:600;color:var(--pri)">'+(S.lang==='ar'?'العربية':'English')+'</div></div>'+
    '<div class="sti" onclick="expData()"><div class="sil"><span class="sii">📤</span><span class="sit">'+t('expD')+'</span></div><div style="color:var(--text2)">›</div></div>'+
    '<div class="sti" onclick="impData()"><div class="sil"><span class="sii">📥</span><span class="sit">'+t('impD')+'</span></div><div style="color:var(--text2)">›</div></div>'+
    '<div class="sti" onclick="delData()"><div class="sil"><span class="sii">🗑️</span><span class="sit" style="color:var(--red)">'+t('delAll')+'</span></div><div style="color:var(--red)">›</div></div>';
}
function toggleDark(){S.dark=!S.dark;document.body.classList.toggle('dark',S.dark);document.getElementById('dbtn').textContent=S.dark?'☀️':'🌙';sv();if(S.cp==='settings')rSettings()}
function toggleLang(){S.lang=S.lang==='ar'?'en':'ar';document.documentElement.lang=S.lang;document.documentElement.dir=S.lang==='ar'?'rtl':'ltr';document.getElementById('lbtn').textContent=S.lang==='ar'?'EN':'عر';document.querySelectorAll('[data-t]').forEach(function(el){var k=el.dataset.t;if(TR[S.lang][k])el.textContent=TR[S.lang][k]});sv();nav(S.cp)}
function expData(){var b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nlp_backup.json';a.click();toast(t('exported'))}
function impData(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var obj=JSON.parse(ev.target.result);for(var k in obj)S[k]=obj[k];normalizeState();sv();nav(S.cp||'home');toast(t('imported'))}catch(err){toast('❌')}};r.readAsText(f)};inp.click()}
function delData(){document.getElementById('mdl').innerHTML='<div class="mh"></div><h3>'+t('delAll')+'</h3><p style="font-size:13px;margin-bottom:16px;color:var(--text2)">'+t('delConf')+'</p><button class="mb dg" onclick="confirmDel()">'+t('confirm')+'</button><button class="mb sc" onclick="closeMdl()">'+t('cancel')+'</button>';showMdl()}
function confirmDel(){S.ck={};S.ip={};S.streak={c:0,ld:null};S.subtasks={};S.editedItems={};S.hiddenItems={};S.gpa={sems:[{id:1,subs:[{n:'',g:'excellent'}]}]};S.gpaR=null;S.cdMode={};S.dailyPlan={baseHours:S.dailyHours||3,overrides:{},days:{}};sv();closeMdl();nav('home');toast(t('deleted'))}

function init(){
  ld();
  refreshDynamicCountdowns();
  if(S.onboarded)document.getElementById('onboard').classList.add('hide');
  if(S.dark){document.body.classList.add('dark');document.getElementById('dbtn').textContent='☀️'}
  if(S.lang==='en'){document.documentElement.lang='en';document.documentElement.dir='ltr';document.getElementById('lbtn').textContent='عر'}
  document.querySelectorAll('[data-t]').forEach(function(el){var k=el.dataset.t;if(TR[S.lang][k])el.textContent=TR[S.lang][k]});
  showPage('home',false);
  rHome();
}
init();
</script>
</body>
</html>
